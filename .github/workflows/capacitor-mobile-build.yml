name: Capacitor Mobile Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

env:
  APP_DIR: wuxue-app
  NODE_VERSION: "20"
  JAVA_VERSION: "21"

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing ANDROID_KEY_PASSWORD"; exit 1; }
          KEYSTORE_PATH="$RUNNER_TEMP/wuxue-release.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          {
            echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build Android artifacts
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease bundleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-artifacts
          if-no-files-found: error
          path: |
            ${{ env.APP_DIR }}/android/app/build/outputs/apk/release/*.apk
            ${{ env.APP_DIR }}/android/app/build/outputs/bundle/release/*.aab

      - name: Publish Android packages to Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" || gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --generate-notes
          gh release upload "$TAG_NAME" \
            android/app/build/outputs/apk/release/*.apk \
            android/app/build/outputs/bundle/release/*.aab \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  ios:
    name: Build iOS
    runs-on: macos-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Create iOS platform if missing
        run: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install CocoaPods
        run: pod install --project-directory=ios/App

      - name: Build iOS app for simulator
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package iOS release asset
        run: |
          cd ios/build/Build/Products/Debug-iphonesimulator
          ditto -c -k --sequesterRsrc --keepParent App.app App-simulator.zip

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-artifacts
          if-no-files-found: error
          path: |
            ${{ env.APP_DIR }}/ios/build/Build/Products/Debug-iphonesimulator/App-simulator.zip

      - name: Publish iOS package to Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" || gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --generate-notes
          gh release upload "$TAG_NAME" \
            ios/build/Build/Products/Debug-iphonesimulator/App-simulator.zip \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
